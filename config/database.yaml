development:
  driver: postgresql
  host: localhost
  port: 5432
  database: fhir_dicom_dev
  username: postgres
  password: postgres
  pool_size: 5
  echo: true

testing:
  driver: postgresql
  host: localhost
  port: 5432
  database: fhir_dicom_test
  username: postgres
  password: postgres
  pool_size: 2
  echo: false

production:
  driver: postgresql
  host: ${DB_HOST}
  port: ${DB_PORT:5432}
  database: ${DB_NAME}
  username: ${DB_USER}
  password: ${DB_PASSWORD}
  pool_size: 20
  max_overflow: 30
  echo: false
  ssl_mode: require