version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./backend/storage:/var/www/storage
      - ./backend/database:/var/www/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - ADMIN_BASIC_USER=admin
      - ADMIN_BASIC_PASSWORD=password
    restart: unless-stopped

